<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Stinger – Stores</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:1920px; height:1080px; overflow:hidden; background:transparent; position:relative; perspective:1200px; }

    .blind {
      position:absolute; top:0; height:1080px;
      transform-style:preserve-3d; backface-visibility:hidden;
      overflow:hidden;
    }
    .blind-bg {
      position:absolute; inset:0;
      background-size:1920px 1080px; background-repeat:no-repeat;
      background-color:#0a0a14;
    }
    .blind-edge {
      position:absolute; right:0; top:0; width:3px; height:100%;
      background:rgba(255,200,50,.6);
    }
    /* Phase1: rotateY(-90→0) s'ouvre | Phase2: rotateY(0→90) se referme */
    @keyframes blindLife {
      0%           { transform:rotateY(-90deg); opacity:1; }
      32%,62%      { transform:rotateY(0deg); }
      100%         { transform:rotateY(90deg); opacity:0; }
    }

    #logo-wrap {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      z-index:20; pointer-events:none;
    }
    #logo-img { max-width:500px; max-height:340px; object-fit:contain; display:none; opacity:0; }
    @keyframes logoLife {
      0%,28%   { opacity:0; transform:scale(.8); }
      40%,58%  { opacity:1; transform:scale(1); filter:drop-shadow(0 0 22px rgba(255,200,50,.8)); }
      88%,100% { opacity:0; }
    }
  </style>
</head>
<body>
  <div id="blinds"></div>
  <div id="logo-wrap"><img id="logo-img" src="" alt="" /></div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    var blindsEl = document.getElementById('blinds');
    var logoImg  = document.getElementById('logo-img');
    var DUR = 1.9;
    var N = 10, w = 1920 / N;
    var bgUrl = 'none';

    function applyConfig(cfg) {
      bgUrl = cfg.bgUrl ? 'url("' + cfg.bgUrl + '?v=' + Date.now() + '")' : 'none';
      if (cfg.logoUrl) { logoImg.src = cfg.logoUrl + '?v=' + Date.now(); logoImg.style.display = 'block'; }
      else logoImg.style.display = 'none';
    }
    function build() {
      for (var i = 0; i < N; i++) {
        var b  = document.createElement('div'); b.className = 'blind';
        b.style.left = (i * w) + 'px'; b.style.width = w + 'px';
        var bg = document.createElement('div'); bg.className = 'blind-bg';
        bg.style.backgroundImage = bgUrl; bg.style.left = (-i * w) + 'px';
        var edge = document.createElement('div'); edge.className = 'blind-edge';
        b.appendChild(bg); b.appendChild(edge);
        b.style.animation = 'blindLife ' + DUR + 's cubic-bezier(.4,0,.2,1) ' + (i * 0.04) + 's forwards';
        blindsEl.appendChild(b);
      }
      logoImg.style.animation = 'logoLife ' + DUR + 's ease forwards';
    }
    fetch('/api/stinger').then(function(r){return r.json();}).then(function(cfg){ applyConfig(cfg); build(); }).catch(function(){ build(); });
    var socket = io(); socket.on('stingerConfig', function(){ location.reload(); });
  </script>
</body>
</html>
